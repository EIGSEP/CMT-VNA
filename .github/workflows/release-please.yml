name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  pypi-publish:
    needs: release-please
    if: |
      always() &&
      (needs.release-please.outputs.release_created ||
       github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name || github.event.inputs.tag }}
      - uses: astral-sh/setup-uv@v8.2.0
      - name: Build package
        run: uv build
      - name: Publish to PyPI
        run: uv publish --trusted-publishing automatic
